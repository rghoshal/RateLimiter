services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Ecommerce Backend Service ──────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      BACKEND_ADDR: ":9000"
    expose:
      - "9000"
    ports:
      - "9000:9000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/healthz" ]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── Rate limiter (3 named replicas share the same image build) ─────────────
  ratelimiter_1:
    build:
      context: .. # repo root — go.mod lives here
      dockerfile: docker/Dockerfile
    environment:
      INSTANCE_ID: rl-1
      REDIS_ADDR: redis:6379
      LISTEN_ADDR: ":8081"
      BACKEND_URL: "http://backend:9000"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/server", "healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3

  ratelimiter_2:
    build:
      context: .. # repo root — go.mod lives here
      dockerfile: docker/Dockerfile
    environment:
      INSTANCE_ID: rl-2
      REDIS_ADDR: redis:6379
      LISTEN_ADDR: ":8081"
      BACKEND_URL: "http://backend:9000"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/server", "healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3

  ratelimiter_3:
    build:
      context: .. # repo root — go.mod lives here
      dockerfile: docker/Dockerfile
    environment:
      INSTANCE_ID: rl-3
      REDIS_ADDR: redis:6379
      LISTEN_ADDR: ":8081"
      BACKEND_URL: "http://backend:9000"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/server", "healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Nginx: API Gateway (rate limiter) + Frontend ───────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    depends_on:
      - ratelimiter_1
      - ratelimiter_2
      - ratelimiter_3
      - backend

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # ── Grafana (auto-provisioned dashboard) ───────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/ratelimiter.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
