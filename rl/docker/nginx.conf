events { worker_connections 1024; }

http {
    # ── Upstream: Rate Limiter Containers ──────────────────────────────────────
    upstream ratelimiter {
        least_conn;
        server ratelimiter_1:8081;
        server ratelimiter_2:8081;
        server ratelimiter_3:8081;
    }



    server {
        listen 80;
        server_name localhost;

        # ── Gateway Proxy: Route through Rate Limiter ─────────────────────────────
        location / {
            proxy_pass         http://ratelimiter;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
            proxy_connect_timeout 2s;
        }

        # ── Metrics: From rate limiter ──────────────────────────────────────────
        location /metrics {
            proxy_pass         http://ratelimiter;
        }
    }
}

