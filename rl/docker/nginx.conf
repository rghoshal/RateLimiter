events { worker_connections 1024; }

http {
    # ── Upstream: Rate Limiter Containers ──────────────────────────────────────
    upstream ratelimiter {
        least_conn;
        server ratelimiter_1:8081;
        server ratelimiter_2:8081;
        server ratelimiter_3:8081;
    }

    # ── Upstream: Backend Service ──────────────────────────────────────────────
    upstream backend {
        server backend:9000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Frontend: Serve HTML/CSS/JS ─────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── API Gateway: Route through Rate Limiter ─────────────────────────────
        location /api/ {
            proxy_pass         http://ratelimiter;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
            proxy_connect_timeout 2s;
        }

        # ── Health Check: Direct backend check ───────────────────────────────────
        location /healthz {
            proxy_pass         http://backend;
            access_log off;
        }

        # ── Metrics: From rate limiter ──────────────────────────────────────────
        location /metrics {
            proxy_pass         http://ratelimiter;
        }
    }
}

